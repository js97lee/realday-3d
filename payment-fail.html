    <script>
      const failParams = new URLSearchParams(window.location.search);
      const code = failParams.get("code") || "-";

      const orderId = failParams.get("orderId") || "-";
      document.querySelector("#failMessage").textContent = message;
      document.querySelector("#failBreakdown").innerHTML = [
        ["에러 코드", code],
        ["주문번호", orderId],
      ]
        .map(([label, value]) => `<div><span>${label}</span><strong>${value}</strong></div>`)
        .join("");
